AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: tot-app picks generator — decoupled from Vercel timeout limits

Parameters:
  SupabaseUrl:
    Type: String
  SupabaseServiceRoleKey:
    Type: String
    NoEcho: true
  AnthropicApiKey:
    Type: String
    NoEcho: true
  TheOddsApiKey:
    Type: String
    NoEcho: true
  SportsGameOddsApiKey:
    Type: String
    NoEcho: true
  AppUrl:
    Type: String
    Description: Vercel app URL (e.g. https://your-app.vercel.app) — Lambda calls /api/mlb back through Vercel

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 300
    MemorySize: 512
    Architectures:
      - arm64
    Environment:
      Variables:
        NEXT_PUBLIC_SUPABASE_URL: !Ref SupabaseUrl
        SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceRoleKey
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        THE_ODDS_API_KEY: !Ref TheOddsApiKey
        SPORTSGAMEODDS_API_KEY: !Ref SportsGameOddsApiKey
        NEXT_PUBLIC_APP_URL: !Ref AppUrl

Resources:

  # ── Dead-letter queue — catches failed invocations for inspection ─────────────
  PicksDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: tot-picks-dlq
      MessageRetentionPeriod: 1209600  # 14 days

  # ── Main trigger queue ────────────────────────────────────────────────────────
  # maxReceiveCount: 1 — never retry. A second run on the same day would delete
  # settled picks, insert duplicates, and corrupt CLV tracking.
  PicksQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: tot-picks-queue
      VisibilityTimeout: 360  # must exceed Lambda timeout (300s) + buffer
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PicksDLQ.Arn
        maxReceiveCount: 1

  # ── Lambda ────────────────────────────────────────────────────────────────────
  PicksGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tot-picks-generator
      Handler: handler.handler
      CodeUri: lambda/picks-generator/
      Description: Generates daily MLB picks — triggered by SQS from Vercel cron
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt PicksQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt PicksQueue.QueueName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - handler.mjs
        External:
          - '@aws-sdk/*'

Outputs:
  PicksQueueUrl:
    Description: Paste this into PICKS_QUEUE_URL on Vercel
    Value: !Ref PicksQueue
    Export:
      Name: PicksQueueUrl

  PicksQueueArn:
    Value: !GetAtt PicksQueue.Arn

  PicksDLQUrl:
    Description: Check here if picks stop generating
    Value: !Ref PicksDLQ
